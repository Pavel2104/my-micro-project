apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: procplatf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: procplatf-api_gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        # Подгружаем POSTGRES_USER и POSTGRES_PASSWORD из секрета
        envFrom:
        - secretRef:
            name: postgres-secret
        env:
        # 1. Исправляем PYTHONPATH для корректных импортов
        - name: PYTHONPATH
          value: "/app:/app/api_gateway"

        # 2. Формируем DATABASE_URL динамически, используя переменные из envFrom
        # Внимательно: здесь мы используем db-server (наш новый сервис)
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@db-server:5432/postgres"

        # 3. Жестко фиксируем порт как число, чтобы перебить системную строку tcp://...
        - name: POSTGRES_PORT
          value: "5432"

        # 4. Адрес для Kafka
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: procplatf
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30938
